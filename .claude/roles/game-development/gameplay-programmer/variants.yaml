# Gameplay Programmer Variants

variants:
  - name: unity-gameplay-programmer
    base_role: gameplay-programmer
    additional_skills:
      - unity-development
    skill_overrides:
      setup-engine:
        engine: unity
        tools:
          - unity-editor
          - visual-studio
          - rider
    description: Unity游戏逻辑程序员，专注于Unity引擎的游戏玩法开发
