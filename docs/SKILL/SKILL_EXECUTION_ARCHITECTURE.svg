<svg width="800" height="1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="roleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skillGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="channelGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="runtimeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="executionGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="1000" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Skill Execution Architecture</text>
  <text x="400" y="65" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">RAMS Framework - Complete Skill Execution Chain</text>

  <!-- Role Instance -->
  <g transform="translate(150, 100)" filter="url(#shadow)">
    <rect x="0" y="0" width="500" height="80" rx="10" fill="url(#roleGradient)"/>
    <text x="250" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Role Instance</text>
    <text x="250" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">Soul (人格设定) + Skills (技能堆栈)</text>
    <text x="250" y="68" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#eee">角色实例化</text>
  </g>

  <!-- Arrow -->
  <line x1="400" y1="180" x2="400" y2="210" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Skill Definition -->
  <g transform="translate(150, 220)" filter="url(#shadow)">
    <rect x="0" y="0" width="500" height="80" rx="10" fill="url(#skillGradient)"/>
    <text x="250" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Skill Definition (What + How)</text>
    <text x="250" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">Input/Output Schema + Implementation Reference</text>
    <text x="250" y="68" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#eee">Skill解析</text>
  </g>

  <!-- Arrow -->
  <line x1="400" y1="300" x2="400" y2="330" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Implementation Channel Selection -->
  <g transform="translate(50, 340)" filter="url(#shadow)">
    <rect x="0" y="0" width="700" height="150" rx="10" fill="#fff" stroke="#4facfe" stroke-width="2"/>
    <text x="350" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Implementation Channel Selection</text>
    
    <!-- AI Model Channel -->
    <g transform="translate(30, 40)">
      <rect x="0" y="0" width="300" height="90" rx="8" fill="url(#channelGradient)"/>
      <text x="150" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">AI Model Channel</text>
      <text x="150" y="45" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">• Image Models (xAI, OpenAI, Google)</text>
      <text x="150" y="60" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">• Video Models (FAL, Google, Kling)</text>
      <text x="150" y="75" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">• Text Models (GPT, Claude, Grok)</text>
    </g>
    
    <!-- Software Tool Channel -->
    <g transform="translate(370, 40)">
      <rect x="0" y="0" width="300" height="90" rx="8" fill="url(#channelGradient)"/>
      <text x="150" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Software Tool Channel</text>
      <text x="150" y="45" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">• Python/JS Scripts</text>
      <text x="150" y="60" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">• MCP Protocol</text>
      <text x="150" y="75" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">• OpenCLI (Chrome CDP)</text>
    </g>
  </g>

  <!-- Arrow -->
  <line x1="400" y1="490" x2="400" y2="520" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Runtime Environment -->
  <g transform="translate(50, 530)" filter="url(#shadow)">
    <rect x="0" y="0" width="700" height="150" rx="10" fill="#fff" stroke="#43e97b" stroke-width="2"/>
    <text x="350" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Runtime Environment</text>
    
    <!-- Desktop IDE -->
    <g transform="translate(20, 40)">
      <rect x="0" y="0" width="160" height="90" rx="8" fill="url(#runtimeGradient)"/>
      <text x="80" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Desktop IDE</text>
      <text x="80" y="45" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• Windsurf ✅</text>
      <text x="80" y="58" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• Cursor ✅</text>
      <text x="80" y="71" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• Claude Desktop ✅</text>
    </g>
    
    <!-- Cloud IDE -->
    <g transform="translate(190, 40)">
      <rect x="0" y="0" width="160" height="90" rx="8" fill="url(#runtimeGradient)"/>
      <text x="80" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Cloud IDE</text>
      <text x="80" y="45" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• Claude Web ✅</text>
      <text x="80" y="58" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• ChatGPT Web ✅</text>
      <text x="80" y="71" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• (渠道受限)</text>
    </g>
    
    <!-- Professional Tools -->
    <g transform="translate(360, 40)">
      <rect x="0" y="0" width="160" height="90" rx="8" fill="url(#runtimeGradient)"/>
      <text x="80" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Professional Tools</text>
      <text x="80" y="45" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• OpenClaw ✅</text>
      <text x="80" y="58" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• Hermes ✅</text>
      <text x="80" y="71" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• (性能优化)</text>
    </g>
    
    <!-- Other -->
    <g transform="translate(530, 40)">
      <rect x="0" y="0" width="150" height="90" rx="8" fill="url(#runtimeGradient)"/>
      <text x="75" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Other</text>
      <text x="75" y="45" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• Web App ✅</text>
      <text x="75" y="58" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• CLI Tool ✅</text>
      <text x="75" y="71" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">• (自动化)</text>
    </g>
  </g>

  <!-- Arrow -->
  <line x1="400" y1="680" x2="400" y2="710" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Execution & Output -->
  <g transform="translate(150, 720)" filter="url(#shadow)">
    <rect x="0" y="0" width="500" height="80" rx="10" fill="url(#executionGradient)"/>
    <text x="250" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Execution & Output</text>
    <text x="250" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">Model API Call / Tool Execution → Result Processing</text>
    <text x="250" y="68" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#eee">结果处理</text>
  </g>

  <!-- Arrow -->
  <line x1="400" y1="800" x2="400" y2="830" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Memory Update -->
  <g transform="translate(150, 840)" filter="url(#shadow)">
    <rect x="0" y="0" width="500" height="60" rx="10" fill="#e0e0e0" stroke="#999" stroke-width="2"/>
    <text x="250" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Memory & State Update</text>
    <text x="250" y="45" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">记忆更新 | 状态管理 | 进化触发</text>
  </g>

  <!-- Legend -->
  <g transform="translate(50, 930)">
    <rect x="0" y="0" width="700" height="50" rx="5" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
    <text x="20" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Legend:</text>
    <text x="20" y="38" font-family="Arial, sans-serif" font-size="10" fill="#666">✅ 完全支持 | ⚠️ 部分支持 | ❌ 不支持</text>
    <text x="350" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Current Environment:</text>
    <text x="350" y="38" font-family="Arial, sans-serif" font-size="10" fill="#666">Windsurf IDE + SWE-1.6 Model</text>
  </g>

  <!-- Side annotations -->
  <g transform="translate(680, 100)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle">1</text>
  </g>
  <g transform="translate(680, 220)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle">2</text>
  </g>
  <g transform="translate(680, 340)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle">3</text>
  </g>
  <g transform="translate(680, 530)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle">4</text>
  </g>
  <g transform="translate(680, 720)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle">5</text>
  </g>
  <g transform="translate(680, 840)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle">6</text>
  </g>

  <!-- Step numbers on the left -->
  <g transform="translate(30, 140)">
    <circle cx="0" cy="0" r="12" fill="#667eea"/>
    <text x="0" y="4" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">1</text>
  </g>
  <g transform="translate(30, 260)">
    <circle cx="0" cy="0" r="12" fill="#f5576c"/>
    <text x="0" y="4" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">2</text>
  </g>
  <g transform="translate(30, 415)">
    <circle cx="0" cy="0" r="12" fill="#4facfe"/>
    <text x="0" y="4" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">3</text>
  </g>
  <g transform="translate(30, 605)">
    <circle cx="0" cy="0" r="12" fill="#43e97b"/>
    <text x="0" y="4" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">4</text>
  </g>
  <g transform="translate(30, 760)">
    <circle cx="0" cy="0" r="12" fill="#fa709a"/>
    <text x="0" y="4" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">5</text>
  </g>
  <g transform="translate(30, 870)">
    <circle cx="0" cy="0" r="12" fill="#999"/>
    <text x="0" y="4" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">6</text>
  </g>
</svg>
