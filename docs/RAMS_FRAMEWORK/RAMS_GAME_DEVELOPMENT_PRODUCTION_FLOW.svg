    <text x="30" y="70" font-family="Arial, sans-serif" font-size="11" fill="white">• core-loop-design</text>
    <text x="30" y="85" font-family="Arial, sans-serif" font-size="11" fill="white">• economy-design</text>
    <text x="30" y="100" font-family="Arial, sans-serif" font-size="11" fill="white">• narrative-design</text>
    <text x="30" y="115" font-family="Arial, sans-serif" font-size="11" fill="white">• story-design</text>
    <text x="30" y="130" font-family="Arial, sans-serif" font-size="11" fill="white">• world-creation</text>
