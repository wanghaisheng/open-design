    <text x="30" y="55" font-family="Arial, sans-serif" font-size="11" fill="white">• project-planning</text>
    <text x="30" y="70" font-family="Arial, sans-serif" font-size="11" fill="white">• sprint-plan</text>
    <text x="30" y="85" font-family="Arial, sans-serif" font-size="11" fill="white">• resource-allocation</text>
    <text x="30" y="100" font-family="Arial, sans-serif" font-size="11" fill="white">• risk-management</text>
    <text x="30" y="115" font-family="Arial, sans-serif" font-size="11" fill="white">• estimate</text>
