    <text x="30" y="100" font-family="Arial, sans-serif" font-size="11" fill="white">• vfx-design</text>
    <text x="30" y="115" font-family="Arial, sans-serif" font-size="11" fill="white">• design-systems</text>
    <text x="30" y="130" font-family="Arial, sans-serif" font-size="11" fill="white">• gdd-author</text>
