<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <linearGradient id="conceptGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="evalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="artGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="protoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="testGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="600" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#333">
    RAMS 游戏开发流程 - 概念验证阶段
  </text>

  <!-- SOUL Layer -->
  <rect x="50" y="80" width="1100" height="60" rx="10" fill="#e9ecef" stroke="#dee2e6" stroke-width="2"/>
  <text x="600" y="115" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#495057">
    SOUL: 游戏开发者的创造力、热情、对玩家体验的关注
  </text>

  <!-- ROLE Layer -->
  <rect x="50" y="160" width="1100" height="60" rx="10" fill="#d4edda" stroke="#c3e6cb" stroke-width="2"/>
  <text x="600" y="195" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#155724">
    ROLE: game-development-role - 负责游戏开发全流程的角色
  </text>

  <!-- SKILL Flow - Concept Validation Phase -->
  <g transform="translate(50, 250)">
    
    <!-- Step 1: Concept Creation -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="180" height="120" rx="15" fill="url(#conceptGradient)" filter="url(#shadow)"/>
      <text x="90" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">
        概念创作
      </text>
      <text x="90" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">
        concept-creation
      </text>
      <text x="90" y="75" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
        brainstorm
      </text>
      <text x="90" y="90" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
        concept-art-generation
      </text>
      <text x="90" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
        reference-collection
      </text>
    </g>

    <!-- Arrow -->
    <line x1="180" y1="60" x2="220" y2="60" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Step 2: Concept Evaluation -->
    <g transform="translate(220, 0)">
      <rect x="0" y="0" width="180" height="120" rx="15" fill="url(#evalGradient)" filter="url(#shadow)"/>
      <text x="90" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">
        概念评估
      </text>
      <text x="90" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">
        concept-evaluation
      </text>
      <text x="90" y="75" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
        concept-art
      </text>
      <text x="90" y="90" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
        design-review
      </text>
      <text x="90" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
        estimate
      </text>
    </g>

    <!-- Arrow -->
    <line x1="400" y1="60" x2="440" y2="60" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Step 3: Concept Art -->
    <g transform="translate(440, 0)">
      <rect x="0" y="0" width="180" height="120" rx="15" fill="url(#artGradient)" filter="url(#shadow)"/>
      <text x="90" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">
        概念美术
      </text>
      <text x="90" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">
        concept-art
      </text>
      <text x="90" y="75" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
        visual-exploration
      </text>
      <text x="90" y="90" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
        style-consistency-check
      </text>
      <text x="90" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
        character-development
      </text>
    </g>

    <!-- Arrow -->
    <line x1="620" y1="60" x2="660" y2="60" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Step 4: Prototype -->
    <g transform="translate(660, 0)">
      <rect x="0" y="0" width="180" height="120" rx="15" fill="url(#protoGradient)" filter="url(#shadow)"/>
      <text x="90" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">
        原型开发
      </text>
      <text x="90" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">
        prototype
      </text>
      <text x="90" y="75" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
        setup-engine
      </text>
      <text x="90" y="90" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
        gameplay-implementation
      </text>
      <text x="90" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
        engine-development
      </text>
    </g>

    <!-- Arrow -->
    <line x1="840" y1="60" x2="880" y2="60" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Step 5: Playtest -->
    <g transform="translate(880, 0)">
      <rect x="0" y="0" width="180" height="120" rx="15" fill="url(#testGradient)" filter="url(#shadow)"/>
      <text x="90" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">
        玩测验证
      </text>
      <text x="90" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">
        playtest-report
      </text>
      <text x="90" y="75" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
        functional-testing
      </text>
      <text x="90" y="90" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
        gate-check
      </text>
      <text x="90" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
        retrospective
      </text>
    </g>

  </g>

  <!-- Decision Diamond -->
  <g transform="translate(600, 420)">
    <polygon points="0,-40 50,0 0,40 -50,0" fill="#ffc107" stroke="#e0a800" stroke-width="2" filter="url(#shadow)"/>
    <text x="0" y="-5" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">
      通过验证?
    </text>
  </g>

  <!-- Arrows from playtest to decision -->
  <line x1="970" y1="370" x2="970" y2="390" stroke="#666" stroke-width="2"/>
  <line x1="970" y1="390" x2="650" y2="390" stroke="#666" stroke-width="2"/>
  <line x1="650" y1="390" x2="650" y2="420" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Yes path -->
  <line x1="600" y1="460" x2="600" y2="520" stroke="#28a745" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="610" y="490" font-family="Arial, sans-serif" font-size="12" fill="#28a745">是 → 进入生产开发</text>

  <!-- No path -->
  <line x1="550" y1="420" x2="200" y2="420" stroke="#dc3545" stroke-width="3"/>
  <line x1="200" y1="420" x2="200" y2="250" stroke="#dc3545" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="350" y="410" font-family="Arial, sans-serif" font-size="12" fill="#dc3545">否 → 迭代概念</text>

  <!-- Production Development Preview -->
  <rect x="50" y="530" width="1100" height="200" rx="15" fill="#e8f5e9" stroke="#4caf50" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2e7d32">
    完整生产开发阶段（下一阶段）
  </text>
  
  <text x="100" y="590" font-family="Arial, sans-serif" font-size="12" fill="#333">
    • 项目规划 (project-planning, sprint-plan, resource-allocation)
  </text>
  <text x="100" y="610" font-family="Arial, sans-serif" font-size="12" fill="#333">
    • 系统设计 (system-design, core-loop-design, economy-design, narrative-design)
  </text>
  <text x="100" y="630" font-family="Arial, sans-serif" font-size="12" fill="#333">
    • 详细设计 (level-design, ui-design, environment-design, vfx-design)
  </text>
  <text x="100" y="650" font-family="Arial, sans-serif" font-size="12" fill="#333">
    • 完整开发 (gameplay-implementation, backend-development, network-programming)
  </text>
  <text x="100" y="670" font-family="Arial, sans-serif" font-size="12" fill="#333">
    • 美术制作 (character-art, environment-art, asset-generation, vfx-creation)
  </text>
  <text x="100" y="690" font-family="Arial, sans-serif" font-size="12" fill="#333">
    • 完整测试 (test-strategy, automation-testing, performance-testing)
  </text>
  <text x="100" y="710" font-family="Arial, sans-serif" font-size="12" fill="#333">
    • 发布准备 (release-checklist, launch-checklist, changelog, patch-notes)
  </text>

  <!-- Legend -->
  <rect x="900" y="750" width="280" height="40" rx="5" fill="#fff" stroke="#ccc"/>
  <circle cx="920" cy="770" r="8" fill="#667eea"/>
  <text x="935" y="774" font-family="Arial, sans-serif" font-size="11" fill="#333">创作类</text>
  <circle cx="990" cy="770" r="8" fill="#f5576c"/>
  <text x="1005" y="774" font-family="Arial, sans-serif" font-size="11" fill="#333">评估类</text>
  <circle cx="1060" cy="770" r="8" fill="#43e97b"/>
  <text x="1075" y="774" font-family="Arial, sans-serif" font-size="11" fill="#333">开发类</text>
  <circle cx="1130" cy="770" r="8" fill="#fa709a"/>
  <text x="1145" y="774" font-family="Arial, sans-serif" font-size="11" fill="#333">测试类</text>

</svg>
