<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="phaseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    
    <!-- Role Colors -->
    <linearGradient id="leadershipGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="designGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="programmingGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="artGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="qaGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="productionGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="publishGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a18cd1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbc2eb;stop-opacity:1" />
    </linearGradient>
    
    <!-- Skill Colors -->
    <linearGradient id="skillCreative" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a5a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="skillProduction" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#44a08d;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="skillProject" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#45b7d1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#96c93d;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="skillReview" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7b733;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fc4a1a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="skillRelease" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a29bfe;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="skillTeam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b894;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:1" />
    </linearGradient>
    
    <!-- Arrow Marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#636e72" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1400" height="900" fill="#ffffff" />
  
  <!-- Title -->
  <text x="700" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2d3436">
    游戏开发工作流：角色与技能映射
  </text>
  <text x="700" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#636e72">
    Game Development Workflow: Role &amp; Skill Mapping
  </text>
  
  <!-- Phase Headers -->
  <!-- Concept Phase -->
  <rect x="50" y="100" width="240" height="40" rx="8" fill="url(#phaseGradient)" stroke="#dfe6e9" stroke-width="2" />
  <text x="170" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2d3436">
    概念阶段 Concept
  </text>
  
  <!-- Design Phase -->
  <rect x="310" y="100" width="240" height="40" rx="8" fill="url(#phaseGradient)" stroke="#dfe6e9" stroke-width="2" />
  <text x="430" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2d3436">
    设计阶段 Design
  </text>
  
  <!-- Development Phase -->
  <rect x="570" y="100" width="240" height="40" rx="8" fill="url(#phaseGradient)" stroke="#dfe6e9" stroke-width="2" />
  <text x="690" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2d3436">
    开发阶段 Development
  </text>
  
  <!-- Testing Phase -->
  <rect x="830" y="100" width="240" height="40" rx="8" fill="url(#phaseGradient)" stroke="#dfe6e9" stroke-width="2" />
  <text x="950" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2d3436">
    测试阶段 Testing
  </text>
  
  <!-- Release Phase -->
  <rect x="1090" y="100" width="240" height="40" rx="8" fill="url(#phaseGradient)" stroke="#dfe6e9" stroke-width="2" />
  <text x="1210" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2d3436">
    发布阶段 Release
  </text>
  
  <!-- Phase Dividers -->
  <line x1="300" y1="100" x2="300" y2="650" stroke="#dfe6e9" stroke-width="2" stroke-dasharray="5,5" />
  <line x1="560" y1="100" x2="560" y2="650" stroke="#dfe6e9" stroke-width="2" stroke-dasharray="5,5" />
  <line x1="820" y1="100" x2="820" y2="650" stroke="#dfe6e9" stroke-width="2" stroke-dasharray="5,5" />
  <line x1="1080" y1="100" x2="1080" y2="650" stroke="#dfe6e9" stroke-width="2" stroke-dasharray="5,5" />
  
  <!-- Concept Phase Content -->
  <!-- Creative Director -->
  <rect x="60" y="160" width="220" height="50" rx="6" fill="url(#leadershipGradient)" />
  <text x="170" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    Creative Director
  </text>
  <text x="170" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
    [1] brainstorm, design-review
  </text>
  
  <!-- Game Designer -->
  <rect x="60" y="220" width="220" height="50" rx="6" fill="url(#designGradient)" />
  <text x="170" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    Game Designer
  </text>
  <text x="170" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
    [1][2] brainstorm, design-review
  </text>
  
  <!-- Art Director -->
  <rect x="60" y="280" width="220" height="50" rx="6" fill="url(#artGradient)" />
  <text x="170" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    Art Director
  </text>
  <text x="170" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
    [1] brainstorm
  </text>
  
  <!-- Producer -->
  <rect x="60" y="340" width="220" height="50" rx="6" fill="url(#productionGradient)" />
  <text x="170" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    Producer
  </text>
  <text x="170" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
    [3] sprint-plan, estimate
  </text>
  
  <!-- Design Phase Content -->
  <!-- Systems Designer -->
  <rect x="320" y="160" width="220" height="50" rx="6" fill="url(#designGradient)" />
  <text x="430" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    Systems Designer
  </text>
  <text x="430" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
    [2][3] design-review, design-systems
  </text>
  
  <!-- Level Designer -->
  <rect x="320" y="220" width="220" height="50" rx="6" fill="url(#designGradient)" />
  <text x="430" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    Level Designer
  </text>
  <text x="430" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
    [2] design-review
  </text>
  
  <!-- Technical Director -->
  <rect x="320" y="280" width="220" height="50" rx="6" fill="url(#leadershipGradient)" />
  <text x="430" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    Technical Director
  </text>
  <text x="430" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
    [2][4] architecture-decision
  </text>
  
  <!-- Technical Artist -->
  <rect x="320" y="340" width="220" height="50" rx="6" fill="url(#artGradient)" />
  <text x="430" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    Technical Artist
  </text>
  <text x="430" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
    [2] asset-audit
  </text>
  
  <!-- Development Phase Content -->
  <!-- Lead Programmer -->
  <rect x="580" y="160" width="220" height="50" rx="6" fill="url(#programmingGradient)" />
  <text x="690" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    Lead Programmer
  </text>
  <text x="690" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
    [2][4] code-review, architecture-decision
  </text>
  
  <!-- Gameplay Programmer -->
  <rect x="580" y="220" width="220" height="50" rx="6" fill="url(#programmingGradient)" />
  <text x="690" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    Gameplay Programmer
  </text>
  <text x="690" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
    [2][4] code-review, prototype
  </text>
  
  <!-- Engine Programmer -->
  <rect x="580" y="280" width="220" height="50" rx="6" fill="url(#programmingGradient)" />
  <text x="690" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    Engine Programmer
  </text>
  <text x="690" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
    [4] setup-engine, perf-profile
  </text>
  
  <!-- Asset Planner -->
  <rect x="580" y="340" width="220" height="50" rx="6" fill="url(#productionGradient)" />
  <text x="690" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    Asset Planner
  </text>
  <text x="690" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
    [1][2] brainstorm, design-review
  </text>
  
  <!-- Testing Phase Content -->
  <!-- QA Lead -->
  <rect x="840" y="160" width="220" height="50" rx="6" fill="url(#qaGradient)" />
  <text x="950" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d3436">
    QA Lead
  </text>
  <text x="950" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">
    [2][4] bug-report, release-checklist
  </text>
  
  <!-- Visual QA Engineer -->
  <rect x="840" y="220" width="220" height="50" rx="6" fill="url(#qaGradient)" />
  <text x="950" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d3436">
    Visual QA Engineer
  </text>
  <text x="950" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">
    [2][4] design-review, asset-audit
  </text>
  
  <!-- Performance Analyst -->
  <rect x="840" y="280" width="220" height="50" rx="6" fill="url(#qaGradient)" />
  <text x="950" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d3436">
    Performance Analyst
  </text>
  <text x="950" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">
    [4] perf-profile, scope-check
  </text>
  
  <!-- QA Tester -->
  <rect x="840" y="340" width="220" height="50" rx="6" fill="url(#qaGradient)" />
  <text x="950" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d3436">
    QA Tester
  </text>
  <text x="950" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">
    [2][4] bug-report, playtest-report
  </text>
  
  <!-- Release Phase Content -->
  <!-- Release Manager -->
  <rect x="1100" y="160" width="220" height="50" rx="6" fill="url(#publishGradient)" />
  <text x="1210" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    Release Manager
  </text>
  <text x="1210" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
    [5] release-checklist, changelog
  </text>
  
  <!-- Localization Lead -->
  <rect x="1100" y="220" width="220" height="50" rx="6" fill="url(#publishGradient)" />
  <text x="1210" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    Localization Lead
  </text>
  <text x="1210" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
    [3][5] localize, patch-notes
  </text>
  
  <!-- Platform Certification Specialist -->
  <rect x="1100" y="280" width="220" height="50" rx="6" fill="url(#publishGradient)" />
  <text x="1210" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    Platform Cert Specialist
  </text>
  <text x="1210" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
    [5] gate-check, launch-checklist
  </text>
  
  <!-- Community Manager -->
  <rect x="1100" y="340" width="220" height="50" rx="6" fill="url(#publishGradient)" />
  <text x="1210" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
    Community Manager
  </text>
  <text x="1210" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
    [3] retrospective, onboard
  </text>
  
  <!-- Workflow Arrows -->
  <!-- Concept to Design -->
  <path d="M 290 200 L 310 200" stroke="#636e72" stroke-width="3" marker-end="url(#arrowhead)" />
  
  <!-- Design to Development -->
  <path d="M 550 200 L 570 200" stroke="#636e72" stroke-width="3" marker-end="url(#arrowhead)" />
  
  <!-- Development to Testing -->
  <path d="M 810 200 L 830 200" stroke="#636e72" stroke-width="3" marker-end="url(#arrowhead)" />
  
  <!-- Testing to Release -->
  <path d="M 1070 200 L 1090 200" stroke="#636e72" stroke-width="3" marker-end="url(#arrowhead)" />
  
  <!-- Cross-Phase Connections -->
  <!-- Creative Director spans all phases -->
  <path d="M 170 210 Q 170 420 430 420 T 690 420 T 950 420 T 1210 420" stroke="#667eea" stroke-width="2" stroke-dasharray="3,3" fill="none" opacity="0.5" />
  
  <!-- Technical Director spans Design through Release -->
  <path d="M 430 330 Q 430 420 690 420 T 950 420 T 1210 420" stroke="#667eea" stroke-width="2" stroke-dasharray="3,3" fill="none" opacity="0.5" />
  
  <!-- Producer spans all phases -->
  <path d="M 170 390 Q 170 440 430 440 T 690 440 T 950 440 T 1210 440" stroke="#ff9a9e" stroke-width="2" stroke-dasharray="3,3" fill="none" opacity="0.5" />
  
  <!-- Legend Section -->
  <rect x="50" y="680" width="1280" height="200" rx="10" fill="#f8f9fa" stroke="#dfe6e9" stroke-width="2" />
  <text x="60" y="705" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2d3436">
    图例 Legend
  </text>
  
  <!-- Role Legend -->
  <text x="60" y="735" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3436">
    角色分类 Role Categories:
  </text>
  
  <rect x="60" y="745" width="30" height="15" rx="3" fill="url(#leadershipGradient)" />
  <text x="100" y="758" font-family="Arial, sans-serif" font-size="12" fill="#2d3436">
    Leadership (领导团队)
  </text>
  
  <rect x="250" y="745" width="30" height="15" rx="3" fill="url(#designGradient)" />
  <text x="290" y="758" font-family="Arial, sans-serif" font-size="12" fill="#2d3436">
    Design (设计团队)
  </text>
  
  <rect x="440" y="745" width="30" height="15" rx="3" fill="url(#programmingGradient)" />
  <text x="480" y="758" font-family="Arial, sans-serif" font-size="12" fill="#2d3436">
    Programming (编程团队)
  </text>
  
  <rect x="630" y="745" width="30" height="15" rx="3" fill="url(#artGradient)" />
  <text x="670" y="758" font-family="Arial, sans-serif" font-size="12" fill="#2d3436">
    Art (艺术团队)
  </text>
  
  <rect x="780" y="745" width="30" height="15" rx="3" fill="url(#qaGradient)" />
  <text x="820" y="758" font-family="Arial, sans-serif" font-size="12" fill="#2d3436">
    QA (质量保证团队)
  </text>
  
  <rect x="970" y="745" width="30" height="15" rx="3" fill="url(#productionGradient)" />
  <text x="1010" y="758" font-family="Arial, sans-serif" font-size="12" fill="#2d3436">
    Production (制作团队)
  </text>
  
  <rect x="1180" y="745" width="30" height="15" rx="3" fill="url(#publishGradient)" />
  <text x="1220" y="758" font-family="Arial, sans-serif" font-size="12" fill="#2d3436">
    Publish (发布团队)
  </text>
  
  <!-- Skill Legend -->
  <text x="60" y="790" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3436">
    技能分类 Skill Categories (数字编码 Number Codes):
  </text>
  
  <rect x="60" y="800" width="30" height="15" rx="3" fill="url(#skillCreative)" />
  <text x="100" y="813" font-family="Arial, sans-serif" font-size="12" fill="#2d3436">
    [1] Creative (创意): brainstorm, aesthetic-direction-framework
  </text>
  
  <rect x="60" y="825" width="30" height="15" rx="3" fill="url(#skillReview)" />
  <text x="100" y="838" font-family="Arial, sans-serif" font-size="12" fill="#2d3436">
    [2] Reviews &amp; Analysis (评审与分析): design-review, code-review, balance-check
  </text>
  
  <rect x="60" y="850" width="30" height="15" rx="3" fill="url(#skillProject)" />
  <text x="100" y="863" font-family="Arial, sans-serif" font-size="12" fill="#2d3436">
    [3] Project Management (项目管理): sprint-plan, estimate, retrospective
  </text>
  
  <rect x="600" y="800" width="30" height="15" rx="3" fill="url(#skillProduction)" />
  <text x="640" y="813" font-family="Arial, sans-serif" font-size="12" fill="#2d3436">
    [4] Production (制作): prototype, setup-engine, perf-profile
  </text>
  
  <rect x="600" y="825" width="30" height="15" rx="3" fill="url(#skillRelease)" />
  <text x="640" y="838" font-family="Arial, sans-serif" font-size="12" fill="#2d3436">
    [5] Release (发布): release-checklist, changelog, patch-notes, hotfix
  </text>
  
  <rect x="600" y="850" width="30" height="15" rx="3" fill="url(#skillTeam)" />
  <text x="640" y="863" font-family="Arial, sans-serif" font-size="12" fill="#2d3436">
    [6] Team Orchestration (团队编排): team-combat, team-narrative, team-ui
  </text>
  
  <!-- Additional Notes -->
  <text x="60" y="880" font-family="Arial, sans-serif" font-size="11" fill="#636e72" font-style="italic">
    * 虚线表示跨阶段协作 (Dashed lines show cross-phase collaboration)
  </text>
  
  <text x="600" y="880" font-family="Arial, sans-serif" font-size="11" fill="#636e72" font-style="italic">
    * 数字编码对应技能分类 (Number codes correspond to skill categories)
  </text>
</svg>
